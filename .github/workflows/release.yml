name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # -------------------------------------------------------------------
  # 1. Build Python package (sdist + wheel)
  # -------------------------------------------------------------------
  build-python-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify wheel installs
        run: |
          python -m venv /tmp/verify-venv
          /tmp/verify-venv/bin/pip install dist/*.whl
          /tmp/verify-venv/bin/airev --version

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  # -------------------------------------------------------------------
  # 2. Publish to PyPI (trusted publishing)
  # -------------------------------------------------------------------
  publish-pypi:
    needs: build-python-package
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/airev/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # -------------------------------------------------------------------
  # 3. Build Docker image
  # -------------------------------------------------------------------
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: interfaces/github_action/Dockerfile
          push: true
          tags: |
            ghcr.io/airev-tools/airev:latest
            ghcr.io/airev-tools/airev:${{ steps.version.outputs.version }}

  # -------------------------------------------------------------------
  # 4. Build native binaries (verified platforms only)
  # -------------------------------------------------------------------
  build-native-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-13
            platform: darwin-x86_64
          - os: macos-14
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install . nuitka ordered-set zstandard

      - name: Build binary
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --output-filename="airev-${GITHUB_REF_NAME}-${{ matrix.platform }}" \
            --include-package=airev_core \
            --include-package=interfaces \
            interfaces/cli/main.py

      - name: Generate checksum
        run: |
          cd .
          sha256sum "airev-${GITHUB_REF_NAME}-${{ matrix.platform }}" \
            > "airev-${GITHUB_REF_NAME}-${{ matrix.platform }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: |
            airev-${{ github.ref_name }}-${{ matrix.platform }}
            airev-${{ github.ref_name }}-${{ matrix.platform }}.sha256

  # -------------------------------------------------------------------
  # 5. Create GitHub Release
  # -------------------------------------------------------------------
  create-github-release:
    needs: [build-python-package, build-docker, build-native-binaries]
    if: always() && needs.build-python-package.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/airev-*
            artifacts/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
