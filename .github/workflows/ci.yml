name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff format --check .
      - run: ruff check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy numpy click rich tree-sitter tree-sitter-python tree-sitter-javascript tree-sitter-typescript
      - run: mypy airev_core/ interfaces/ --strict

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest pytest-cov syrupy numpy click rich tree-sitter tree-sitter-python tree-sitter-javascript tree-sitter-typescript datasketch loky
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=airev_core --cov-report=term-missing --cov-fail-under=70
      - name: Snapshot integrity
        run: pytest tests/ --snapshot-warn-unused

  pickle-safety:
    name: Pickle Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest syrupy numpy click rich tree-sitter tree-sitter-python tree-sitter-javascript tree-sitter-typescript datasketch loky
      - run: pytest tests/ -k "pickle" -v
